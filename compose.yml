
services:
  ngotelin_db:
    image: postgres:15-alpine
    container_name: ngotelin_postgres_container
    restart: always
    environment:
      POSTGRES_USER: admin_ngotel
      POSTGRES_PASSWORD: ngotelin123
      POSTGRES_DB: ngotelin_db
    ports:
      - "5432:5432"
    volumes:
      - ngotelin_postgres_data:/var/lib/postgresql/data

  # 4. GUI Database (PgAdmin)
  ngotelin_pgadmin:
    image: dpage/pgadmin4
    container_name: ngotelin_pgadmin_container
    restart: always
    environment:
      PGADMIN_DEFAULT_EMAIL: admin@ngotelin.com
      PGADMIN_DEFAULT_PASSWORD: admin123
    ports:
      - "8080:80" # change if conflict port with other app
    depends_on:
      - ngotelin_db # Same With DB Service Name

# Management Volume Data
volumes:
  ngotelin_postgres_data: